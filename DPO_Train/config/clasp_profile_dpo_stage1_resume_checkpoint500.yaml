### 阶段 1 续训：从 output_dir 下的 checkpoint-500 恢复（optimizer / scheduler / 步数）
### 使用场景：上一轮在 total_steps=576 未满时中断，磁盘上最新为 checkpoint-500。
###
### 请勿改 output_dir；必须 overwrite_output_dir=false，否则会清目录或无法续训。
### 若你实际最新目录是 checkpoint-600 等，请改掉下面 resume_from_checkpoint。
###
### 启动：
###   cd ~/personality/DEEPER/LLaMA-Factory
###   llamafactory-cli train /home/xiaosong/personality/Clasp/DPO_Train/config/clasp_profile_dpo_stage1_resume_checkpoint500.yaml

### Model
model_name_or_path: /data/LLM_models/Meta-Llama-3-8B-Instruct
trust_remote_code: true

### Method
stage: dpo
do_train: true
finetuning_type: lora

### Dataset（与阶段 1 一致）
dataset_dir: /home/xiaosong/personality/DEEPER/data
dataset: clasp_profile_dpo_stage1
template: llama3
cutoff_len: 8192
overwrite_cache: false
preprocessing_num_workers: 4
dataloader_num_workers: 2

### LoRA（须与断点里 adapter 结构一致：rank/alpha/target）
lora_target: all
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.1

pref_beta: 0.2
pref_ftx: 0.1
pref_loss: sigmoid

### Train（与 clasp_profile_dpo_stage1_llama3_lora.yaml 保持一致）
output_dir: /home/xiaosong/personality/DEEPER/saves/clasp_profile_dpo_stage1_base
overwrite_output_dir: false
resume_from_checkpoint: /home/xiaosong/personality/DEEPER/saves/clasp_profile_dpo_stage1_base/checkpoint-500
per_device_train_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 5.0e-6
num_train_epochs: 4
lr_scheduler_type: cosine
warmup_ratio: 0.05
max_grad_norm: 1.0
bf16: true
ddp_timeout: 180000000
optim: adamw_torch

### Eval（续训后仍按 eval_steps 触发；与原版一致）
do_eval: true
eval_strategy: steps
eval_steps: 100
val_size: 0.05
per_device_eval_batch_size: 2

logging_steps: 5
save_steps: 100
save_total_limit: 4
plot_loss: true
report_to: none

### Clasp 画像 DPO — 阶段 2：含 commercial；在阶段 1 LoRA 上继续训
### 导出：
###   python scripts/export_clasp_dpo_for_llamafactory.py \
###     --input output/dpo/train/dpo_pairs_stage2_commercial_involved.jsonl \
###     --output /home/xiaosong/personality/DEEPER/data/DEEPER_train_data/clasp/profile_dpo_stage2.jsonl
### adapter_name_or_path：首次跑阶段 2 时指向阶段 1 的 checkpoint-*；断点续训时请用环境变量
### HANDOFF_CKPT 或 CLASP_STAGE2_RESUME=1（见 run_llamafactory_stage2.sh），应加载阶段 2 目录下最新的 checkpoint-*。
### run_llamafactory_stage2.sh 默认会用阶段 1 最新 checkpoint 覆盖本字段；续训时不要沿用该默认值。
### 训练：DPO_Train/run_llamafactory_stage2.sh 或 run_llamafactory_two_stage.sh

### Model
model_name_or_path: /data/LLM_models/Meta-Llama-3-8B-Instruct
adapter_name_or_path: /home/xiaosong/personality/DEEPER/saves/clasp_profile_dpo_stage1_base
trust_remote_code: true

stage: dpo
do_train: true
finetuning_type: lora
create_new_adapter: false

### Dataset
dataset_dir: /home/xiaosong/personality/DEEPER/data
dataset: clasp_profile_dpo_stage2
template: llama3
cutoff_len: 8192
overwrite_cache: true
preprocessing_num_workers: 4
dataloader_num_workers: 2

lora_target: all
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.1

pref_beta: 0.2
pref_ftx: 0.1
pref_loss: sigmoid

### Train
output_dir: /home/xiaosong/personality/DEEPER/saves/clasp_profile_dpo_stage2_commercial
# 续训必须为 false，否则不会从 output_dir 下自动 pick 最新 checkpoint（详见 LLaMA-Factory parser）。
# 若要从零重跑阶段 2 且放弃当前 output，可先删除/移走该目录或临时改为 true。
overwrite_output_dir: false
resume_from_checkpoint: null
per_device_train_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 3.0e-6
num_train_epochs: 3
lr_scheduler_type: cosine
warmup_ratio: 0.03
max_grad_norm: 1.0
bf16: true
ddp_timeout: 180000000
optim: adamw_torch

do_eval: true
eval_strategy: steps
eval_steps: 100
val_size: 0.05
per_device_eval_batch_size: 2

logging_steps: 5
save_steps: 100
save_total_limit: 4
plot_loss: true
report_to: none
